name: Release
on:
  push:
    tags:
      - "v*"

# permissions: {}
permissions:
  contents: read

env:
  REGISTRY: git.jeremyhoarau.re

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Préparer le nom d'image (en minuscules)
        run: |
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ gitea.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Login au registre Gitea
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login "${{ env.REGISTRY }}" \
            --username "${{ gitea.actor }}" --password-stdin

      - name: Build de l'image prod
        run: |
          docker build --target prod \
            -t "$IMAGE:${{ gitea.ref_name }}" \
            -t "$IMAGE:latest" .

      - name: Push
        run: |
          docker push "$IMAGE:${{ gitea.ref_name }}"
          docker push "$IMAGE:latest"