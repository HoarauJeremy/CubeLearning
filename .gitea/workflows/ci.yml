name: CI
on:
  pull_request:
  push:
    branches: [main]

# permissions: {}
permissions:
  contents: read

jobs:
  ci:
    # Le label doit correspondre à un label déclaré sur ton act_runner
    # (ubuntu-latest est le mapping par défaut vers une image type node/ubuntu).
    runs-on: ubuntu-latest
    steps:
      # NOTE sécurité : idéalement, épingler chaque action sur un SHA précis
      # plutôt qu'un tag de version (ex: actions/checkout@<sha>).
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          # Nécessite que le cache soit activé dans la config de l'act_runner.
          # Si le step échoue à cause du cache, supprimer simplement cette ligne.
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Tests (vitest)
        run: npm run test

      - name: Build de vérification
        run: npm run build