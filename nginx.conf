server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # Assets fingerprintés par Vite (hash dans le nom de fichier) :
    # cache agressif, ils ne changent jamais.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service worker (vite-plugin-pwa) : JAMAIS de cache long,
    # sinon les utilisateurs restent bloqués sur une vieille version.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback : toute route inconnue renvoie index.html
    # (index.html non caché pour que les déploiements soient visibles immédiatement).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}